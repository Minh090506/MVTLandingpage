const log = document.getElementById("log");
function addLog(msg, cls) {
  const d = document.createElement("div");
  d.className = "status " + cls;
  d.textContent = msg;
  log.appendChild(d);
}

async function uploadAll() {
  addLog("Starting upload of " + images.length + " images...", "uploading");
  let ok = 0, fail = 0;
  for (const img of images) {
    addLog("Uploading: " + img.filename + " (" + img.size + ")...", "uploading");
    try {
      const res = await fetch(EDGE_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ filename: img.filename, data: img.data })
      });
      const text = await res.text();
      if (res.ok) {
        addLog("OK: " + img.filename, "success");
        ok++;
      } else {
        addLog("FAIL " + res.status + ": " + img.filename + " - " + text, "error");
        fail++;
      }
    } catch(e) {
      addLog("ERROR: " + img.filename + " - " + e.message, "error");
      fail++;
    }
  }
  addLog("Done! " + ok + "/" + images.length + " uploaded successfully.", ok === images.length ? "success" : "error");
}
uploadAll();
</script>
</body></html>
