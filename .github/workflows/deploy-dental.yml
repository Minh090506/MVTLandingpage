name: Deploy VietnamDentalTravel

on:
  push:
    branches: [main]
    paths:
      - 'pages/vietnamdentaltravel/**'
      - 'build-dental.js'
      - 'wrangler-dental.toml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node build-dental.js
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler-dental.toml
