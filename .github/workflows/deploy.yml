name: Build & Deploy MVT Landing Pages

on:
  push:
    branches: [main]
    paths:
      - 'pages/**'
      - 'build.js'
      - 'wrangler.toml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-deploy:
    name: Build & Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build worker.js from pages
        run: node build.js

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Deployment summary
        run: |
          echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Worker:** escape-myvivatour" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://escape.myvivatour.com" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Landing Pages Deployed:" >> $GITHUB_STEP_SUMMARY
          for dir in pages/*/; do
            page=$(basename "$dir")
            if [ "$page" = "escape" ]; then
              echo "- **$page** → https://escape.myvivatour.com/" >> $GITHUB_STEP_SUMMARY
            else
              echo "- **$page** → https://escape.myvivatour.com/$page" >> $GITHUB_STEP_SUMMARY
            fi
          done

  upload-images:
    name: Upload images to Supabase Storage
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: |
      contains(github.event.head_commit.message, '[upload-images]') ||
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @supabase/supabase-js

      - name: Upload images to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/upload-to-supabase.js
